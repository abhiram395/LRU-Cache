name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Python syntax check
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          for path in [Path("app.py"), Path("lrucache.py"), *Path("tests").glob("*.py")]:
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path))

          print("Python syntax OK")
          PY

      - name: Template JavaScript syntax check
        run: |
          node -e "const fs=require('fs'); const html=fs.readFileSync('templates/index.html','utf8'); const script=html.match(/<script>([\s\S]*)<\/script>/)[1]; new Function(script);"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
